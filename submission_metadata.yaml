ai_usage_summary: |
  No AI tools were used for code generation. All code is original work.
  Architecture and design decisions were made manually based on domain knowledge
  of candidate ranking systems and evidence-based scoring.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  4-axis Evidence Consistency Engine (ECS) with geometric mean aggregation
  catches contradictions that additive scoring misses. Candidates claiming
  expertise without assessments, GitHub activity, or career progression
  get penalized hard. LightGBM LambdaMART trained on weak-supervision labels
  from JD heuristics provides learning-to-rank. Twin resolution with
  counterfactual explanations ensures every ranking decision is explainable.
  MMR diversity guarantees the top 100 has varied archetypes.
  Deterministic feature-based reasoning (no LLM) stays under 300 chars.
  CPU-only, ~119s runtime, zero network calls.

